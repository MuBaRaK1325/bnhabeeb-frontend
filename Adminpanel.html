<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MayConnect Admin Panel</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="dashboard">
  <h1 id="usernameDisplay">Hello User</h1>
  <p>Wallet Balance: <span id="walletBalance">₦0</span></p>

  <!-- Admin Panel -->
  <div id="adminPanel" class="hidden">
    <h2>Admin Dashboard</h2>

    <!-- Profit Summary -->
    <div id="profitSection">
      <p>Total Profit: <span id="profitBalance">₦0</span></p>
      <button id="refreshProfit">Refresh</button>
    </div>

    <!-- Withdraw Section -->
    <div id="withdrawSection">
      <h3>Withdraw Profit</h3>
      <input type="number" id="withdrawAmount" placeholder="Enter amount to withdraw">
      <input type="text" id="withdrawAccount" placeholder="Bank/Account info">
      <button id="withdrawBtn">Submit Withdrawal</button>
    </div>

    <!-- Recent Transactions -->
    <div id="adminTransactions">
      <h3>Recent Transactions</h3>
      <div id="transactionHistoryAdmin"></div>
    </div>
  </div>

  <!-- User Transaction History -->
  <h3>My Recent Transactions</h3>
  <div id="transactionHistory"></div>

  <!-- PIN Modal -->
  <div id="pinModal" class="hidden">
    <h3 id="pinModalTitle"></h3>
    <div id="pinModalBody"></div>
    <button onclick="closePinModal()">Close</button>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
