<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNHABEEB DATA HUB - Login</title>

<meta name="theme-color" content="#14B8A6">
<meta name="msapplication-TileColor" content="#14B8A6">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="images/BNHABEEB.png">
<link rel="apple-touch-icon" href="images/BNHABEEB.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, sans-serif;
}

body{
  background:linear-gradient(135deg, #0a1a1a, #102d2d);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  flex-direction:column;
  padding:1rem;
}

/* LOADER */
#loginLoader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0a1a1a;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
}

.loaderRing{
  width:70px;
  height:70px;
  border:6px solid rgba(20, 184, 166, 0.2);
  border-top:6px solid #14B8A6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* LOGO */
.logo{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid #14B8A6;
  padding:8px;
  margin-bottom:40px;
  box-shadow:0 0 20px rgba(20, 184, 166, 0.4);
  background:rgba(255, 255, 255, 0.1);
  backdrop-filter:blur(10px);
  object-fit:cover;
}

/* CARD */
.card{
  background:rgba(255, 255, 255, 0.1);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255, 255, 255, 0.2);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:380px;
  box-shadow:0 8px 32px rgba(0, 0, 0, 0.4);
}

.title{
  text-align:center;
  font-size:26px;
  margin-bottom:25px;
  font-weight:700;
}

/* INPUT */
.inputBox{
  margin-bottom:18px;
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255, 255, 255, 0.2);
  background:rgba(255, 255, 255, 0.1);
  color:white;
  font-size:16px;
  outline:none;
  transition:all 0.2s;
}
input::placeholder{color:rgba(255, 255, 255, 0.7);}
input:focus{
  border-color:#14B8A6;
  background:rgba(255, 255, 255, 0.15);
}

/* SHOW BUTTON */
.showBtn{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#14B8A6;
  cursor:pointer;
  font-weight:600;
}

/* BUTTON */
.loginBtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:white;
  color:#14B8A6;
  font-size:17px;
  font-weight:700;
  margin-top:10px;
  cursor:pointer;
  transition:all 0.2s;
}
.loginBtn:hover{transform:translateY(-2px);}
.loginBtn:disabled{opacity:0.6;cursor:not-allowed;}

/* BIOMETRIC */
.biometric{
  margin-top:16px;
  border:2px dashed #14B8A6;
  padding:16px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
  background:rgba(20, 184, 166, 0.1);
}
.biometric:hover{background:rgba(20, 184, 166, 0.2);}

/* SIGNUP */
.signup{
  margin-top:15px;
  border:2px solid rgba(255, 255, 255, 0.3);
  padding:14px;
  border-radius:12px;
  text-align:center;
  background:rgba(255, 255, 255, 0.1);
  transition:all 0.2s;
}
.signup:hover{background:rgba(255, 255, 255, 0.2);}

a{
  color:white;
  text-decoration:none;
  display:block;
}

</style>

</head>
<body>

<div id="loginLoader">
<div class="loaderRing"></div>
<p style="margin-top:15px">Logging in...</p>
</div>

<img src="images/BNHABEEB.png" class="logo" alt="BNHABEEB Logo">

<div class="card">

<div class="title">Welcome Back</div>

<div class="inputBox">
<input id="loginUsername" placeholder="Username or Email">
</div>

<div class="inputBox">
<input id="loginPassword" type="password" placeholder="Password">
<button class="showBtn" onclick="togglePassword()">Show</button>
</div>

<button id="loginBtn" class="loginBtn">Login</button>

<div class="biometric" onclick="biometricLogin()">
🔐 Login with Fingerprint / Face ID
</div>

<a href="signup.html">
<div class="signup">Create Account</div>
</a>
<a href="https://wa.me/2348108871581?text=I%20forgot%20my%20password" class="btn btn-ghost">Forgot Password?</a>

</div>

<script>
const API = "https://mayconnect-backend-1.onrender.com";

/* ELEMENTS */
const usernameInput = document.getElementById("loginUsername");
const passwordInput = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const loader = document.getElementById("loginLoader");

/* SOUND */
const welcomeSound = new Audio("sounds/welcome.mp3");

/* AUTO LOGIN */
document.addEventListener("DOMContentLoaded", () => {
  const token = localStorage.getItem("token");
  if (token) {
    window.location.href = "dashboard.html";
  }
});

/* PASSWORD TOGGLE */
function togglePassword(){
  if(!passwordInput) return;
  passwordInput.type = passwordInput.type === "password"? "text" : "password";
  document.querySelector(".showBtn").innerText = passwordInput.type === "password"? "Show" : "Hide";
}

/* LOGIN CLICK */
loginBtn.addEventListener("click", login);

/* LOGIN FUNCTION */
async function login(){
  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();

  if(!username ||!password){
    alert("Enter username and password");
    return;
  }

  loginBtn.disabled = true;
  loader.style.display = "flex";

  try{
    const res = await fetch(API + "/api/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ username, password })
    });

    let data;
    try{
      data = await res.json();
    }catch{
      throw new Error("Invalid server response");
    }

    if(!res.ok){
      throw new Error(data.message || "Login failed");
    }

    if(!data.token){
      throw new Error("No token received");
    }

    /* SAVE SESSION */
    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.username);

    /* ADMIN */
    if(data.is_admin){
      alert("Welcome Admin");
    }

    /* SOUND */
    welcomeSound.play().catch(()=>{});

    /* REDIRECT */
    setTimeout(()=>{
      window.location.href = "dashboard.html";
    },600);

  }catch(err){
    console.error(err);
    alert(err.message || "Server error");
    loader.style.display = "none";
    loginBtn.disabled = false;
  }
}

/* ================= HELPERS ================= */

function base64urlToArrayBuffer(base64url) {

  if (!base64url) {
    throw new Error("Missing base64url value");
  }

  const padding =
    "=".repeat((4 - (base64url.length % 4)) % 4);

  const base64 =
    (base64url + padding)
     .replace(/-/g, "+")
     .replace(/_/g, "/");

  const binary = atob(base64);

  const bytes = new Uint8Array(binary.length);

  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  return bytes.buffer;
}

function arrayBufferToBase64url(buffer) {

  const bytes = new Uint8Array(buffer);

  let binary = "";

  for (const b of bytes) {
    binary += String.fromCharCode(b);
  }

  return btoa(binary)
   .replace(/\+/g, "-")
   .replace(/\//g, "_")
   .replace(/=/g, "");

}

/* ================= LOGIN ================= */

async function biometricLogin() {

  try {

    const res = await fetch(
      API + "/api/auth/webauthn/login-start",
      {
        method: "POST",
        credentials: "include"
      }
    );

    const options = await res.json();

    if (!res.ok) {
      throw new Error(options.error || "Login start failed");
    }

    const publicKey = {
      challenge: base64urlToArrayBuffer(
        options.challenge
      ),
      rpId: options.rpId,
      timeout: options.timeout,
      userVerification:
        options.userVerification || "preferred"
    };

    if (
      Array.isArray(options.allowCredentials) &&
      options.allowCredentials.length > 0
    ) {

      publicKey.allowCredentials =
        options.allowCredentials.map(c => ({

          type: "public-key",

          id: base64urlToArrayBuffer(
            String(c.id).trim()
          ),

          transports:
            Array.isArray(c.transports)
             ? c.transports
              : ["internal", "hybrid"]

        }));

    }

    const credential =
      await navigator.credentials.get({
        publicKey
      });

    if (!credential) {
      throw new Error("Cancelled");
    }

    const authRes = await fetch(
      API + "/api/auth/webauthn/login-finish",
      {
        method: "POST",
        credentials: "include",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          id: credential.id,

          rawId:
            arrayBufferToBase64url(
              credential.rawId
            ),

          response: {

            authenticatorData:
              arrayBufferToBase64url(
                credential.response.authenticatorData
              ),

            clientDataJSON:
              arrayBufferToBase64url(
                credential.response.clientDataJSON
              ),

            signature:
              arrayBufferToBase64url(
                credential.response.signature
              ),

            userHandle:
              credential.response.userHandle
               ? arrayBufferToBase64url(
                    credential.response.userHandle
                  )
                : null

          },

          type: credential.type

        })
      }
    );

    const data = await authRes.json();

    if (!authRes.ok) {
      throw new Error(
        data.error || "Verification failed"
      );
    }

   
    localStorage.setItem(
  "token",
  data.token
);

if (data.user) {

  localStorage.setItem(
    "userId",
    data.user.id
  );

  localStorage.setItem(
    "username",
    data.user.username
  );

  localStorage.setItem(
    "email",
    data.user.email || ""
  );

}

    location.href = "dashboard.html";

  }
  catch (err) {

    console.error(err);

  }

}
</script>

</body>
</html>
