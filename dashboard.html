<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MAY-Connect | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<style>

#splashLoader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020b1f;
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
transition:opacity .4s ease;
}

#splashLoader.hide{
opacity:0;
pointer-events:none;
}

.wallet-card{
background:#08142c;
padding:20px;
border-radius:12px;
margin:20px;
text-align:center;
}

.section{
background:#08142c;
padding:20px;
border-radius:12px;
margin:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#020b1f;
color:white;
}

button{
margin-top:10px;
padding:12px;
border:none;
background:#3b78e7;
color:white;
border-radius:8px;
width:100%;
cursor:pointer;
}

.action-btn{
margin-top:10px;
background:#162a52;
}

.support{
margin:20px;
text-align:center;
}

</style>

</head>

<body>

<!-- SPLASH LOADER -->

<div id="splashLoader">
<img src="images/logo.png" style="width:90px;border-radius:50%">
</div>

<!-- USER -->

<h3 id="usernameDisplay" style="text-align:center;margin-top:20px;">
Hello 👋 User
</h3>

<!-- WALLET -->

<div class="wallet-card">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<!-- ACCOUNT SETTINGS -->

<div class="section">

<h3>Account Settings</h3>

<button class="action-btn" onclick="openSetPinModal()" id="pinBtn">
Set Transaction PIN
</button>

<button class="action-btn" onclick="openChangePasswordModal()">
Change Password
</button>

<button class="action-btn" onclick="toggleBiometric()">
Enable Biometric Login
</button>

<button class="action-btn" onclick="logout()">
Logout
</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" class="section" style="display:none;">

<h3>Admin Profit Withdrawal</h3>

<p>
Profit Balance:
<strong id="profitBalance">₦0</strong>
</p>

<input type="number" id="withdrawAmount" placeholder="Enter Amount">

<input type="text" id="bankName" placeholder="Bank Name">

<input type="text" id="accountNumber" placeholder="Account Number">

<button onclick="adminWithdraw()">Withdraw Profit</button>

</div>

<!-- TRANSACTIONS -->

<div class="section">

<h3>Recent Transactions</h3>

<div id="transactionHistory"></div>

</div>

<!-- SUPPORT -->

<div class="support">

<a href="https://wa.me/2348117988561" target="_blank">

<button style="background:#25D366;">
Chat Support (08117988561)
</button>

</a>

</div>

<!-- SET PIN MODAL -->

<div id="setPinModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;align-items:center;justify-content:center;z-index:9999;">

<div style="background:#08142c;padding:25px;border-radius:12px;width:90%;max-width:300px;text-align:center;">

<h3>Set Transaction PIN</h3>

<input id="newPin" type="password" maxlength="4" placeholder="Enter 4-digit PIN">

<button onclick="savePin()">Save PIN</button>

</div>

</div>

<!-- CHANGE PASSWORD MODAL -->

<div id="passwordModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;align-items:center;justify-content:center;z-index:9999;">

<div style="background:#08142c;padding:25px;border-radius:12px;width:90%;max-width:300px;text-align:center;">

<h3>Change Password</h3>

<input id="oldPassword" type="password" placeholder="Current Password">

<input id="newPassword" type="password" placeholder="New Password">

<button onclick="changePassword()">Update Password</button>

</div>

</div>

<script src="app.js?v=3"></script>

</body>
</html>
