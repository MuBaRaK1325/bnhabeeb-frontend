<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAY-Connect | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<style>
/* GENERAL */
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
  padding-bottom:90px;
  display:none; /* hidden until dashboard loads */
}

/* DASHBOARD LOADER */
#dashboardLoader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020b1f;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
}
.loader{
  width:70px;
  height:70px;
  border:6px solid #0c1a36;
  border-top:6px solid #3b78e7;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* Remaining CSS omitted for brevity, keep all your styles from previous file */
</style>
</head>

<body>

<!-- LOADER -->
<div id="dashboardLoader">
  <div class="loader"></div>
  <p style="margin-top:15px">Loading dashboard...</p>
</div>

<!-- HEADER -->
<div class="logo-circle">
  <img src="images/logo.png" alt="Logo">
</div>
<div style="text-align:center;margin-bottom:10px;">
  <h3 id="usernameDisplay">Hello 👋 User</h3>
</div>

<!-- SOUNDS -->
<audio id="welcomeSound" src="sounds/welcome.mp3"></audio>
<audio id="successSound" src="sounds/success.mp3"></audio>

<!-- WALLET -->
<div class="wallet-card">
  <p>Wallet Balance</p>
  <strong id="walletBalance">₦0</strong>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-card">
  <h3>Admin Profit Withdrawal</h3>
  <p>Total Profit</p>
  <strong id="profitBalance">₦0</strong>
  <input type="number" id="withdrawAmount" placeholder="Enter Amount">
  <input type="text" id="bankName" placeholder="Bank Name">
  <input type="text" id="accountNumber" placeholder="Account Number">
  <button class="admin-withdraw-btn" onclick="adminWithdraw()">Withdraw Profit</button>
</div>

<!-- POPULAR PLAN -->
<div class="popular-plan">
  <h4>🔥 Most Popular Data Plan</h4>
  <p>1GB for ₦300</p>
  <button onclick="location.href='data.html'">Buy Now</button>
</div>

<!-- TRANSACTIONS -->
<h3 style="margin-left:20px;">Recent Transactions</h3>
<div id="transactionHistory"></div>

<!-- SUPPORT -->
<div class="support-box">
  <h4>Need Help?</h4>
  <button onclick="callSupport()">📞 Call Support</button>
  <button onclick="chatSupport()">💬 Contact Developer</button>
</div>

<!-- QUICK ACTIONS -->
<div class="quickActions">
  <button onclick="location.href='data.html'">📶<span>Data</span></button>
  <button onclick="location.href='airtime.html'">📞<span>Airtime</span></button>
  <button onclick="location.href='fund.html'">💳<span>Fund</span></button>
</div>

<!-- PROFILE PANEL -->
<div id="profilePanel" class="profilePanel">
  <div style="text-align:center">
    <div id="avatar" class="avatar">U</div>
    <h3 id="profileName">User</h3>
    <p id="profileEmail">email@email.com</p>
  </div>
  <button id="setPinBtn" class="profileBtn" onclick="openPinModal('','pin')">🔐 Set Transaction PIN</button>
  <button id="changePinBtn" class="profileBtn" onclick="openPinModal('','pin')" style="display:none;">🔑 Change PIN</button>
  <button class="profileBtn" onclick="toggleProfile()">⬇ Close</button>
</div>

<!-- PIN MODAL -->
<div id="pinModal" class="pinModal">
  <div class="pinBox">
    <h3>Create Transaction PIN</h3>
    <div class="pinInputs">
      <input maxlength="1" oninput="movePin(this,0)">
      <input maxlength="1" oninput="movePin(this,1)">
      <input maxlength="1" oninput="movePin(this,2)">
      <input maxlength="1" oninput="movePin(this,3)">
    </div>
    <button style="margin-top:20px" onclick="savePin()">Save PIN</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomNav">
  <button onclick="location.href='dashboard.html'">🏠<span>Home</span></button>
  <button onclick="location.href='data.html'">📶<span>Data</span></button>
  <button onclick="location.href='transactions.html'">📜<span>History</span></button>
  <button onclick="toggleProfile()">👤<span>Profile</span></button>
</div>

<script src="app.js"></script>
<script>
/* PROFILE PANEL */
function toggleProfile(){
  document.getElementById("profilePanel").classList.toggle("show");
}

/* SUPPORT */
function callSupport(){ window.location.href="tel:08117988561"; }
function chatSupport(){ window.location.href="https://wa.me/2348117988561"; }

/* WELCOME SOUND */
window.addEventListener("load", async ()=>{
  document.body.style.display="block"; 
  setTimeout(()=>{
    document.getElementById("welcomeSound")?.play().catch(()=>{});
  },1200);
});
</script>
</body>
</html>
