<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAY Connect</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:none;
padding-bottom:120px;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
}

.logo img{
width:80px;
border-radius:50%;
border:3px solid #3b78e7;
padding:4px;
}

.walletCard{
margin:20px;
padding:20px;
border-radius:16px;
text-align:center;
background:linear-gradient(135deg,#3b78e7,#274ea3);
}

.section{display:none;padding:20px;}
.section.active{display:block;}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#3b78e7;
border:none;
padding:12px;
border-radius:10px;
color:white;
margin-top:10px;
width:100%;
}

.transactionCard{
background:#08142c;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#050b18;
display:flex;
justify-content:space-around;
}

.logoSmall{width:40px;margin-top:10px;}

.pinModal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.pinBox{
background:#0c1a36;
padding:20px;
border-radius:10px;
width:85%;
}

/* 🔥 ADMIN UI */
.userCard{
background:#08142c;
padding:12px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo"><img src="images/logo.png"></div>
<div onclick="showSection('profile')">👤</div>
</header>

<!-- ================= HOME ================= -->
<section id="home" class="section active">
<h3 id="usernameDisplay"></h3>

<div class="walletCard">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<div id="transactionHistory"></div>
</section>

<!-- ================= DATA ================= -->
<section id="data" class="section">
<select id="networkSelect"></select>
<img id="networkLogo" class="logoSmall">

<input id="dataPhone" placeholder="Phone Number">
<select id="planSelect"></select>

<button onclick="openPinModal('data')">Buy Data</button>
<button onclick="confirmBiometric()">Use Fingerprint</button>
</section>

<!-- ================= AIRTIME ================= -->
<section id="airtime" class="section">
<input id="airtimePhone" placeholder="Phone">
<input id="airtimeAmount" placeholder="Amount">

<button onclick="openPinModal('airtime')">Buy Airtime</button>
<button onclick="confirmBiometric()">Use Fingerprint</button>
</section>

<!-- ================= TRANSACTIONS ================= -->
<section id="transactions" class="section">
<div id="allTransactions"></div>
</section>

<!-- ================= PROFILE ================= -->
<section id="profile" class="section">
<button onclick="changePassword()">Change Password</button>
<button onclick="changePin()">Change PIN</button>
<button onclick="toggleBiometric()">Toggle Biometric</button>
<button onclick="logout()">Logout</button>
</section>

<!-- ================= ADMIN PANEL ================= -->
<section id="admin" class="section" style="display:none">

<h3>Admin Panel</h3>

<p>Total Profit</p>
<strong id="adminTotalProfit">₦0</strong>

<hr>

<h4>Search Users</h4>
<input id="searchUserInput" placeholder="Enter username or email">
<button onclick="searchUsers()">Search</button>

<div id="userResults"></div>

</section>

<!-- ================= PIN MODAL ================= -->
<div id="pinModal" class="pinModal">
<div class="pinBox">
<input id="pinInput" placeholder="PIN">
<button onclick="confirmPurchase()">Confirm</button>
<button onclick="closePinModal()">Cancel</button>
</div>
</div>

<!-- ================= NAV ================= -->
<div class="bottomNav">
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('data')">Data</button>
<button onclick="showSection('airtime')">Airtime</button>
<button onclick="showSection('transactions')">History</button>
<button onclick="showSection('admin')">Admin</button>
</div>

<script src="app.js"></script>

<script>

/* ================= PWA ================= */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

/* ================= NAV ================= */

let purchaseType=""

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* ================= PIN ================= */

function openPinModal(type){
purchaseType=type
pinModal.style.display="flex"
}

function closePinModal(){
pinModal.style.display="none"
pinInput.value=""
}

function confirmPurchase(){
const pin=pinInput.value
if(!pin) return alert("Enter PIN")

if(purchaseType==="data") buyData(pin)
if(purchaseType==="airtime") buyAirtime(pin)

closePinModal()
}

/* ================= 🔥 ADMIN SEARCH ================= */

async function searchUsers(){

const query = document.getElementById("searchUserInput").value

if(!query) return alert("Enter search")

const res = await fetch(API+"/api/admin/search-users?q="+query,{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})

const users = await res.json()

const container = document.getElementById("userResults")
container.innerHTML=""

users.forEach(u=>{
const div=document.createElement("div")
div.className="userCard"

div.innerHTML=`
<strong>${u.username}</strong><br>
${u.email}<br>
Balance: ₦${u.wallet_balance}<br>

<input placeholder="Amount" id="amt-${u.id}">
<button onclick="creditUser(${u.id})">Credit</button>
`

container.appendChild(div)
})

}

async function creditUser(userId){

const amount = document.getElementById("amt-"+userId).value

await fetch(API+"/api/admin/credit",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({user_id:userId,amount})
})

alert("User credited")
}

</script>

</body>
</html>
