<!DOCTYPE html>
<html>

<head>

<title>Buy Data</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#020b1f;
color:white;
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
background:#08142c;
color:white;
}

.networkBox{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

#networkLogo{
width:45px;
border:3px solid #3b78e7;
border-radius:50%;
padding:4px;
display:none;
}

#networkName{
background:#08142c;
padding:6px 12px;
border-radius:8px;
display:none;
}

.planCard{
background:#08142c;
padding:15px;
border-radius:12px;
margin-top:10px;
border:1px solid #12264f;
cursor:pointer;
transition:0.2s;
}

.planCard:hover{
border-color:#3b78e7;
}

button{
background:#3b78e7;
border:none;
padding:12px;
border-radius:8px;
color:white;
margin-top:10px;
width:100%;
}

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
}

.hidden{
display:none;
}

.modalCard{
background:#08142c;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
}

</style>

</head>

<body>

<h2>Buy Data</h2>

<input
id="phone"
placeholder="Enter phone number"
oninput="detectNetworkAndShowPlans()"
>

<div class="networkBox">

<img id="networkLogo">

<span id="networkName"></span>

</div>

<div id="plans"></div>


<!-- CONFIRM PURCHASE MODAL -->

<div id="pinModal" class="modalOverlay hidden">

<div class="modalCard">

<h3>Confirm Purchase</h3>

<p id="confirmNetwork"></p>
<p id="confirmPhone"></p>
<p id="confirmPlan"></p>
<p id="confirmPrice"></p>

<hr style="margin:10px 0;border:1px solid #12264f">

<h4>Enter Transaction PIN</h4>

<input type="password" id="pin">

<button onclick="confirmPurchase()">Confirm Purchase</button>

<button onclick="confirmBiometric()">Confirm with Biometrics</button>

<button onclick="closePinModal()">Cancel</button>

</div>

</div>

<script src="app.js"></script>

<script>

/* NETWORK DATA */

const networks = {

MTN:{
prefix:["0803","0806","0703","0706","0813","0816","0810","0814","0903","0906","0913","0916"],
logo:"images/Mtn.png"
},

AIRTEL:{
prefix:["0802","0808","0701","0708","0812","0901","0902","0907","0911","0912"],
logo:"images/Airtel.png"
},

GLO:{
prefix:["0805","0807","0705","0811","0815","0905","0915"],
logo:"images/Glo.png"
},

"9MOBILE":{
prefix:["0809","0817","0818","0908","0909"],
logo:"images/9mobile.png"
}

}

/* DATA PLANS */

const dataPlans=[

{id:1,plan:"500MB",price:150,validity:"1 Day"},
{id:2,plan:"1GB",price:300,validity:"7 Days"},
{id:3,plan:"2GB",price:600,validity:"30 Days"},
{id:4,plan:"5GB",price:1400,validity:"30 Days"}

]

let selectedNetwork=null
let selectedPlan=null

/* NETWORK DETECTION */

function detectNetworkAndShowPlans(){

let phone=document.getElementById("phone").value.replace(/\D/g,"")

if(phone.startsWith("234")){
phone="0"+phone.slice(3)
}

const prefix=phone.substring(0,4)

for(const net in networks){

if(networks[net].prefix.includes(prefix)){

selectedNetwork=net

document.getElementById("networkLogo").src=networks[net].logo
document.getElementById("networkLogo").style.display="block"

document.getElementById("networkName").innerText=net
document.getElementById("networkName").style.display="block"

showPlans()

return
}

}

}

/* SHOW PLANS */

function showPlans(){

const plansDiv=document.getElementById("plans")
plansDiv.innerHTML=""

dataPlans.forEach(p=>{

const card=document.createElement("div")

card.className="planCard"

card.innerHTML=`
<strong>${p.plan}</strong><br>
₦${p.price}<br>
<small>Validity: ${p.validity}</small>
`

card.onclick=()=>openConfirmModal(p)

plansDiv.appendChild(card)

})

}

/* OPEN CONFIRM MODAL */

function openConfirmModal(plan){

selectedPlan=plan

document.getElementById("confirmNetwork").innerText="Network: "+selectedNetwork
document.getElementById("confirmPhone").innerText="Phone: "+document.getElementById("phone").value
document.getElementById("confirmPlan").innerText="Plan: "+plan.plan
document.getElementById("confirmPrice").innerText="Price: ₦"+plan.price

document.getElementById("pinModal").classList.remove("hidden")

}

/* CLOSE MODAL */

function closePinModal(){
document.getElementById("pinModal").classList.add("hidden")
}

</script>

</body>
</html>
