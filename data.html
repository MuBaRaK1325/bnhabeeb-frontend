<!DOCTYPE html>
<html>

<head>

<title>Buy Data</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#020b1f;
color:white;
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
background:#08142c;
color:white;
}

.networkBox{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

#networkLogo{
width:45px;
border:3px solid #3b78e7;
border-radius:50%;
padding:4px;
display:none;
}

#networkName{
background:#08142c;
padding:6px 12px;
border-radius:8px;
display:none;
}

.planCard{
background:#08142c;
padding:15px;
border-radius:12px;
margin-top:10px;
border:1px solid #12264f;
cursor:pointer;
}

button{
background:#3b78e7;
border:none;
padding:12px;
border-radius:8px;
color:white;
margin-top:10px;
width:100%;
}

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
}

.hidden{
display:none;
}

.modalCard{
background:#08142c;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
}

</style>

</head>

<body>

<h2>Buy Data</h2>

<input
id="phone"
placeholder="Enter phone number"
oninput="handlePhoneInput(this)"
>

<div class="networkBox">

<img id="networkLogo">

<span id="networkName"></span>

</div>

<div id="plans"></div>


<!-- CONFIRM PURCHASE MODAL -->

<div id="pinModal" class="modalOverlay hidden">

<div class="modalCard">

<h3>Confirm Purchase</h3>

<p id="confirmNetwork"></p>

<p id="confirmPhone"></p>

<p id="confirmPlan"></p>

<p id="confirmPrice"></p>

<hr style="margin:10px 0;border:1px solid #12264f">

<h4>Enter Transaction PIN</h4>

<input type="password" id="pin">

<button onclick="confirmPurchase()">Confirm Purchase</button>

<button onclick="confirmBiometric()">Confirm with Biometrics</button>

<button onclick="closePinModal()">Cancel</button>

</div>

</div>

<script src="app.js"></script>

<script>

/* NETWORK PREFIX DETECTION */

const networks = {

mtn:{
prefix:[
"0803","0806","0813","0816","0810","0814","0903","0906","0913","0916"
],
name:"MTN",
logo:"images/mtn.png"
},

airtel:{
prefix:[
"0802","0808","0812","0701","0708","0902","0907","0901"
],
name:"Airtel",
logo:"images/airtel.png"
},

glo:{
prefix:[
"0805","0807","0811","0705","0905"
],
name:"Glo",
logo:"images/glo.png"
},

nineMobile:{
prefix:[
"0809","0817","0818","0908","0909"
],
name:"9mobile",
logo:"images/9mobile.png"
}

}

/* SAMPLE DATA PLANS */

const dataPlans=[

{plan:"500MB",price:150,validity:"1 Day"},

{plan:"1GB",price:300,validity:"7 Days"},

{plan:"2GB",price:600,validity:"30 Days"},

{plan:"5GB",price:1400,validity:"30 Days"}

]

let selectedNetwork=null
let selectedPlan=null


/* PHONE INPUT */

function handlePhoneInput(input){

const number=input.value.substring(0,4)

for(const net in networks){

if(networks[net].prefix.includes(number)){

selectedNetwork=networks[net]

document.getElementById("networkLogo").src=selectedNetwork.logo
document.getElementById("networkLogo").style.display="block"

document.getElementById("networkName").innerText=selectedNetwork.name
document.getElementById("networkName").style.display="block"

showPlans()

}

}

}

/* SHOW DATA PLANS */

function showPlans(){

const plansDiv=document.getElementById("plans")

plansDiv.innerHTML=""

dataPlans.forEach(p=>{

const card=document.createElement("div")

card.className="planCard"

card.innerHTML=`

<strong>${p.plan}</strong>

<br>

₦${p.price}

<br>

<small>Validity: ${p.validity}</small>

`

card.onclick=()=>openConfirmModal(p)

plansDiv.appendChild(card)

})

}

/* OPEN MODAL */

function openConfirmModal(plan){

selectedPlan=plan

document.getElementById("confirmNetwork").innerText="Network: "+selectedNetwork.name

document.getElementById("confirmPhone").innerText="Phone: "+document.getElementById("phone").value

document.getElementById("confirmPlan").innerText="Plan: "+plan.plan

document.getElementById("confirmPrice").innerText="Price: ₦"+plan.price

document.getElementById("pinModal").classList.remove("hidden")

}

/* CLOSE MODAL */

function closePinModal(){

document.getElementById("pinModal").classList.add("hidden")

}

/* CONFIRM PURCHASE */

async function confirmPurchase(){

const pin=document.getElementById("pin").value

if(!pin){

alert("Enter transaction PIN")

return

}

alert("Purchase successful (connect backend later)")

closePinModal()

}

/* BIOMETRIC PURCHASE */

function confirmBiometric(){

if(localStorage.getItem("biometric")==="true"){

alert("Biometric verified")

confirmPurchase()

}else{

alert("Biometric not enabled")

}

}

</script>

</body>
</html>
